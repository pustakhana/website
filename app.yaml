runtime: nodejs18
env: standard

env_variables:
  MONGODB_URI: ""
  JWT_SECRET: ""
  NODE_ENV: "production"
  PORT: "8080"

handlers:
  - url: ".*"
    script: auto
    secure: always

automatic_scaling:
  min_instances: 1
  max_instances: 5
  cpu_utilization: 0.5
  idle_timeout: 10m

vpc_connector: ""

includes:
  - .env
